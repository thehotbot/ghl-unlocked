<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 340px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
    }
    h2 { margin: 0 0 12px; font-size: 16px; }
    .info { margin: 4px 0; color: #666; font-size: 12px; }
    .token-status { margin: 8px 0; font-size: 12px; padding: 6px 8px; border-radius: 4px; }
    .valid { background: #dcfce7; color: #166534; }
    .expired { background: #fef2f2; color: #991b1b; }
    .missing { background: #fefce8; color: #854d0e; }
    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 12px;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .status { margin-top: 8px; font-size: 12px; }
    .error { color: #dc2626; }
    .success { color: #16a34a; }
    pre {
      background: #f1f5f9;
      padding: 8px;
      border-radius: 4px;
      font-size: 11px;
      overflow-x: auto;
      max-height: 100px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <h2>GHL Unlocked</h2>
  <div id="info"></div>
  <div id="jwt-status" class="token-status missing">Checking for GHL JWT...</div>
  <div id="firebase-status" class="token-status missing">Checking Firebase token...</div>
  <button id="copyBtn" disabled>Loading...</button>
  <pre id="preview"></pre>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
